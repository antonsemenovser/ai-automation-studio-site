<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feed cards — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--panel:#111c34;--line:#243049;--text:#eef2f7;--muted:#93a4c0;--shadow:0 18px 40px rgba(0,0,0,.42);}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:40px;display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;-webkit-font-smoothing:antialiased;}
.vcard{width:280px;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .16s ease,border-color .2s ease,box-shadow .2s ease;}
.vcard:hover{transform:translateY(-3px);border-color:#3a4a73;box-shadow:var(--shadow);}
.vthumb{position:relative;aspect-ratio:16/9;background:radial-gradient(120% 100% at 50% 0%,#1b2949,#0e1730);display:flex;align-items:center;justify-content:center;}
.vthumb .play{width:52px;height:52px;border-radius:50%;background:rgba(99,102,241,.95);display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;padding-left:3px;}
.vthumb .vtag{position:absolute;top:10px;left:10px;background:rgba(8,12,24,.8);border:1px solid var(--line);color:#cbd5e1;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;}
.vbody{padding:14px 15px 16px;display:flex;flex-direction:column;gap:9px;}
.vbody .t{font-size:14.5px;font-weight:600;line-height:1.35;}
.vbody .m{font-size:12.5px;color:var(--muted);display:flex;gap:7px;align-items:center;}
.vbody .m .src{color:#9fb0d0;font-weight:600;}
</style></head><body>
<div class="vcard">
  <div class="vthumb"><span class="vtag">▶ video</span><div class="play">▶</div></div>
  <div class="vbody"><div class="t">How AI agents capture leads while you sleep</div><div class="m"><span class="src">YouTube</span><span>· 2d ago</span></div></div>
</div>
<div class="vcard">
  <div class="vthumb"><span class="vtag">📰 news</span></div>
  <div class="vbody"><div class="t">New multilingual model lands for support automation</div><div class="m"><span class="src">TechCrunch</span><span>· today</span></div></div>
</div>
</body></html>
