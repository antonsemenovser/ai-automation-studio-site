<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catalog card — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--panel:#111c34;--panel2:#16223d;--line:#243049;--text:#eef2f7;--muted:#93a4c0;--accent:#6366f1;--green:#5eba7d;--shadow:0 18px 40px rgba(0,0,0,.42);}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:40px;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
.cat{width:340px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;display:flex;flex-direction:column;transition:transform .16s ease,border-color .2s ease,box-shadow .2s ease;}
.cat:hover{transform:translateY(-3px);border-color:#3a4a73;box-shadow:var(--shadow);}
.cat:hover .cat-h .ic{background:linear-gradient(135deg,#6366f1,#4f46e5);}
.cat-h{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.cat-h .ic{font-size:22px;width:40px;height:40px;border-radius:11px;background:var(--panel2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:background .2s ease;}
.cat-h h3{font-size:16px;line-height:1.25;margin:0;}
.cat ul{list-style:none;color:var(--muted);font-size:14px;flex:1;margin:0;padding:0;}
.cat ul li{padding:5px 0 5px 20px;position:relative;}
.cat ul li:before{content:"›";position:absolute;left:4px;color:var(--accent);font-weight:700;}
.cat .price{margin-top:14px;color:var(--green);font-weight:700;font-size:14px;}
</style></head><body>
<div class="cat">
  <div class="cat-h"><span class="ic">🧠</span><h3>AI assistants on your data</h3></div>
  <ul>
    <li>AI chatbot trained on your FAQ, prices &amp; docs</li>
    <li>Website chat widget that answers 24/7</li>
    <li>Internal assistant that searches company docs</li>
    <li>Support auto-responder with human handoff</li>
    <li>Multilingual answers in any language</li>
  </ul>
  <div class="price">from €300</div>
</div>
</body></html>
