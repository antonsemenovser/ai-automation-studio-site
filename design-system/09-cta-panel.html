<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CTA panel — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--line:#243049;--text:#eef2f7;--muted:#93a4c0;}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:40px;-webkit-font-smoothing:antialiased;}
.final{text-align:center;background:linear-gradient(135deg,#1a2342,#141d36);border:1px solid var(--line);border-radius:20px;padding:48px 24px;}
.final h2{font-size:30px;margin:0 0 10px;}
.final p{color:var(--muted);margin:0 0 26px;}
.btn{display:inline-block;margin:6px;padding:14px 24px;border-radius:12px;font-weight:600;font-size:15px;}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 10px 26px rgba(79,70,229,.42);}
.btn-ghost{background:rgba(24,35,61,.7);color:#cdd7ea;border:1px solid var(--line);}
</style></head><body>
<div class="final">
  <h2>Got a task to automate?</h2>
  <p>Message the live bot — it'll take your request in your language. Free assessment, no calls.</p>
  <a class="btn btn-primary">💬 Message the bot</a>
  <a class="btn btn-ghost">📢 Follow the channel</a>
</div>
</body></html>
