<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buttons — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--line:#243049;--text:#eef2f7;--muted:#93a4c0;}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:40px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.lbl{font-size:12px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;width:100%;margin-bottom:4px;}
.btn{display:inline-block;padding:14px 24px;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;transition:transform .12s ease,box-shadow .2s,opacity .2s;}
.btn:hover{transform:translateY(-2px);}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 10px 26px rgba(79,70,229,.42);}
.btn-primary:hover{box-shadow:0 14px 34px rgba(99,102,241,.55);}
.btn-ghost{background:rgba(24,35,61,.7);color:#cdd7ea;border:1px solid var(--line);}
.btn-ghost:hover{border-color:#3a4a73;background:#1d2a49;}
</style></head><body>
<div class="row"><span class="lbl">.btn-primary — gradient, lift + glow on hover</span>
  <a class="btn btn-primary">🤖 Try the live AI demo</a>
  <a class="btn btn-primary">Request this bot →</a>
</div>
<div class="row"><span class="lbl">.btn-ghost — outlined, fills on hover</span>
  <a class="btn btn-ghost">💬 Message the bot</a>
  <a class="btn btn-ghost">📢 Follow the channel</a>
</div>
</body></html>
