<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Service card — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--line:#243049;--text:#eef2f7;--muted:#93a4c0;--accent:#6366f1;--green:#5eba7d;--shadow:0 18px 40px rgba(0,0,0,.42);}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:40px;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
.card{width:340px;background:linear-gradient(180deg,#13203b,#101a31);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:transform .16s ease,box-shadow .2s ease,border-color .2s ease;}
.card:hover{transform:translateY(-4px);border-color:#3a4a73;box-shadow:var(--shadow);}
.card .shot{background:radial-gradient(120% 100% at 50% 0%,#1b2949,#13203b);padding:26px 18px;text-align:center;border-bottom:1px solid var(--line);font-size:46px;}
.card .body{padding:22px;flex:1;display:flex;flex-direction:column;}
.card h3{font-size:20px;margin:0 0 6px;}
.card .price{color:var(--green);font-weight:700;margin-bottom:12px;}
.card ul{list-style:none;color:var(--muted);font-size:14px;margin:0 0 18px;padding:0;}
.card ul li{padding:4px 0 4px 22px;position:relative;}
.card ul li:before{content:"✓";position:absolute;left:0;color:var(--accent);}
.btn{display:block;margin-top:auto;text-align:center;padding:14px 24px;border-radius:12px;font-weight:600;font-size:15px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 10px 26px rgba(79,70,229,.42);}
</style></head><body>
<div class="card">
  <div class="shot">🤖</div>
  <div class="body">
    <h3>Telegram Lead-Capture Bot</h3>
    <div class="price">from €150</div>
    <ul>
      <li>Captures every lead 24/7, even after hours</li>
      <li>Auto-answers FAQs in the customer's language</li>
      <li>Instantly notifies you about each new lead</li>
      <li>Built-in mini-CRM (/leads, /stats)</li>
    </ul>
    <a class="btn">Try it live →</a>
  </div>
</div>
</body></html>
