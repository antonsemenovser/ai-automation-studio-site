<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hero — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--line:#243049;--text:#eef2f7;--muted:#93a4c0;--green:#5eba7d;}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:56px 32px;text-align:center;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;}
body:before{content:"";position:absolute;inset:0;z-index:-1;background:radial-gradient(58% 44% at 50% -8%,rgba(99,102,241,.22),transparent 72%),radial-gradient(40% 30% at 88% 6%,rgba(34,211,238,.10),transparent 70%);}
.badge{display:inline-flex;align-items:center;gap:8px;margin-bottom:22px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.35);color:#c7d0f0;padding:7px 15px;border-radius:30px;font-size:13px;font-weight:500;}
.badge .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(94,186,125,.6);animation:pulse 2.2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(94,186,125,.55);}70%{box-shadow:0 0 0 9px rgba(94,186,125,0);}100%{box-shadow:0 0 0 0 rgba(94,186,125,0);}}
h1{font-size:50px;line-height:1.1;font-weight:800;letter-spacing:-.025em;margin:0;background:linear-gradient(180deg,#fff,#aab8d6);-webkit-background-clip:text;background-clip:text;color:transparent;}
h1 .grad{background:linear-gradient(120deg,#818cf8,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent;}
p{color:var(--muted);font-size:18.5px;max-width:660px;margin:20px auto 32px;}
.cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-block;padding:14px 24px;border-radius:12px;font-weight:600;font-size:15px;}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 10px 26px rgba(79,70,229,.42);}
.btn-ghost{background:rgba(24,35,61,.7);color:#cdd7ea;border:1px solid var(--line);}
.chips{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:36px;}
.chips span{background:rgba(17,28,52,.7);border:1px solid var(--line);color:#cbd5e1;padding:8px 14px;border-radius:20px;font-size:13px;}
</style></head><body>
<span class="badge"><span class="pulse"></span> Live demo bots you can try right now</span>
<h1>Custom AI bots &amp; <span class="grad">automation</span><br>for your business</h1>
<p>Bots, AI assistants trained on your data, automation, content and web — built fast, all in text, no calls.</p>
<div class="cta"><a class="btn btn-primary">🤖 Try the live AI demo</a><a class="btn btn-ghost">💬 Message the bot</a></div>
<div class="chips"><span>🌍 Any language</span><span>🛟 No hallucinations</span><span>⚡ 24/7</span><span>🚀 Ready in 2–4 days</span></div>
</body></html>
