<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Header / nav — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--line:#243049;--text:#eef2f7;--muted:#93a4c0;--accent:#6366f1;}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;-webkit-font-smoothing:antialiased;}
header{padding:14px 0;border-bottom:1px solid var(--line);background:rgba(11,17,32,.92);backdrop-filter:blur(8px);}
.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;max-width:1300px;margin:0 auto;padding:0 24px;}
.brand{font-weight:700;font-size:17px;display:flex;align-items:center;gap:9px;}
.brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;}
.nav-right{display:flex;align-items:center;gap:16px;}
.links{display:flex;gap:20px;font-size:14px;color:var(--muted);}
.links a{cursor:pointer;}
.links a:hover{color:#fff;}
.lang{position:relative;display:flex;align-items:center;}
.lang select{-webkit-appearance:none;appearance:none;cursor:pointer;background:#18233d;color:#dbe4f5;border:1px solid var(--line);border-radius:11px;padding:9px 34px 9px 34px;font-size:14px;font-weight:600;max-width:160px;}
.lang:before{content:"🌐";position:absolute;left:11px;font-size:14px;pointer-events:none;}
.lang:after{content:"▾";position:absolute;right:13px;color:var(--muted);pointer-events:none;}
</style></head><body>
<header><div class="nav">
  <div class="brand"><span class="dot">🤖</span> AI Automation Studio</div>
  <div class="nav-right">
    <nav class="links"><a>Demos</a><a>Videos</a><a>Services</a><a>How it works</a></nav>
    <div class="lang"><select aria-label="Language"><option>English</option><option>Deutsch</option><option>Русский</option><option>Українська</option></select></div>
  </div>
</div></header>
</body></html>
