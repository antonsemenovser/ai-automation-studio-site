<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feature tile & step — AI Automation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--panel:#111c34;--line:#243049;--text:#eef2f7;--muted:#93a4c0;--accent2:#4f46e5;--shadow:0 18px 40px rgba(0,0,0,.42);}
*{box-sizing:border-box;}
body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:48px 40px;display:flex;gap:22px;flex-wrap:wrap;-webkit-font-smoothing:antialiased;}
.feat{width:280px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;transition:transform .16s ease,border-color .2s ease,box-shadow .2s ease;}
.feat:hover{transform:translateY(-3px);border-color:#3a4a73;box-shadow:var(--shadow);}
.feat .ic{font-size:24px;margin-bottom:10px;}
.feat h4{font-size:16px;margin:0 0 5px;}
.feat p{color:var(--muted);font-size:14px;margin:0;}
.step{width:280px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;position:relative;transition:transform .16s ease,border-color .2s ease,box-shadow .2s ease;}
.step:hover{transform:translateY(-3px);border-color:#3a4a73;box-shadow:var(--shadow);}
.step:before{content:"2";position:absolute;top:-14px;left:20px;width:30px;height:30px;border-radius:9px;background:var(--accent2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.step h4{margin:10px 0 5px;font-size:16px;}
.step p{color:var(--muted);font-size:14px;margin:0;}
</style></head><body>
<div class="feat"><div class="ic">🛟</div><h4>Never makes things up</h4><p>Answers only from your data; hands off to a human when it doesn't know.</p></div>
<div class="step"><h4>I build it</h4><p>A working bot in 2–4 days, customised to your texts, branding and logic.</p></div>
</body></html>
